<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <title>История – StudyBuddy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f7f7fb }
    .container { max-width: 1000px; }
    .panel { background:#fff; border-radius:12px; padding:18px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
  </style>
</head>
<body>
<nav class="navbar bg-primary navbar-dark mb-3">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">StudyBuddy</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('history') }}">История</a>
  </div>
</nav>

<div class="container">
  <div class="panel">
    <h4 class="mb-3">Последни анализи</h4>
    {% if not items %}
      <div class="text-muted">Все още няма записи.</div>
    {% else %}
      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Снимка</th>
              <th>Обобщение (преглед)</th>
              <th>Кога</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
          {% for it in items %}
            <tr>
              <td class="mono">{{ it.id }}</td>
              <td>{{ it.image_name }}</td>
              <td>{{ it.summary_preview or (it.ocr_preview or '') }}</td>
              <td class="mono">{{ it.created_at }}</td>
              <td><a class="btn btn-sm btn-primary" href="{{ url_for('analysis_detail', analysis_id=it.id) }}">Детайли</a></td>
            </tr>
          {% endfor %}
          </tbody>
        </table>
      </div>
    {% endif %}
  </div>
</div>
</body>
</html>
