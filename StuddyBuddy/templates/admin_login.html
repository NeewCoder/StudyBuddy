<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <title>Admin Login – StudyBuddy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style> body{background:#f6f7fb} .card{max-width:420px;margin:80px auto;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.08)} </style>
</head>
<body>
<div class="card p-4">
  <h4 class="mb-3 text-center">Админ вход</h4>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Потребител</label>
      <input class="form-control" name="username" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Парола</label>
      <input type="password" class="form-control" name="password" required>
    </div>
    <button class="btn btn-primary w-100">Вход</button>
  </form>
  <a class="btn btn-link mt-2" href="{{ url_for('index') }}">← Към началото</a>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="mt-3">
      {% for cat, msg in messages %}
        <div class="alert alert-{{ 'warning' if cat=='warning' else 'danger' if cat=='danger' else 'info' }} py-2">{{ msg }}</div>
      {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
</div>
</body>
</html>
